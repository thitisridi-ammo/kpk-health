<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสุขภาพ รพ.สต.แก่งผักกูด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0f4ff;min-height:100vh;font-size:14px}
input,select,textarea{font-family:'Sarabun',sans-serif}
.inp{width:100%;padding:9px 12px;border:1.5px solid #d1d9e6;border-radius:9px;font-size:14px;outline:none;background:#fff;color:#1a202c;transition:border-color .2s}
.inp:focus{border-color:#2563eb}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(80,100,160,.10);margin-bottom:12px}
.btn{border:none;border-radius:11px;padding:11px 18px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;transition:transform .1s}
.btn:active{transform:scale(.97)}
.chk-item{display:flex;align-items:center;justify-content:center;background:#f8faff;border:1.5px solid #d1d9e6;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;font-weight:600;color:#1a202c;transition:all .15s}
.chk-item.on{border-color:#2563eb;background:#2563eb;color:#fff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pt-card{padding:11px;border:1.5px solid #e2e8f0;border-radius:12px;margin-bottom:8px;cursor:pointer;background:#fff}
.pt-card:hover{background:#f0f4ff}
</style>
</head>
<body>
<div id="root"></div>
<script>
const PREFIXES=['นาย','นาง','นางสาว','เด็กชาย','เด็กหญิง','ด.ช.','ด.ญ.'];
const VILLAGES=['หมู่ 1','หมู่ 2','หมู่ 3','หมู่ 4','หมู่ 5','หมู่ 6','หมู่ 7','หมู่ 8','นอกเขต'];
const DIS_PRESET=['ไม่มีโรคประจำตัว','ความดันโลหิตสูง','เบาหวาน','ไขมันในเลือดสูง'];
const DIRECTOR='นางสาวปานรดา ศิริพันธุ์';
const DIRECTOR_TITLE='พยาบาลวิชาชีพชำนาญการ\nผู้อำนวยการโรงพยาบาลส่งเสริมสุขภาพตำบลแก่งผักกูด';

const DB_KEY='kpk_v3';
let DB=JSON.parse(localStorage.getItem(DB_KEY)||'{"patients":[],"readings":[],"bpdrug":[],"sugar":[]}');
const saveDB=()=>localStorage.setItem(DB_KEY,JSON.stringify(DB));

let PAGE='home',PREV='home';
let FORM={};
let DIS_SEL=[];
let _allergy=null,_fast=null,AOR='';

function nav(p){PREV=PAGE;PAGE=p;DIS_SEL=[];_allergy=null;_fast=null;R()}
function R(){document.getElementById('root').innerHTML=render();attachAll()}
function render(){
  const map={home:homeHTML,bp7_lookup:bp7LookupHTML,bp7_info:bp7InfoHTML,bp7_form:bp7FormHTML,bp7_status:bp7StatusHTML,bp7_admin:bp7AdminHTML,bp7_detail:bp7DetailHTML,bpdrug:bpDrugHTML,sugar:sugarHTML,guide:guideHTML,dashboard:dashboardHTML,admin_bpdrug:adminBPDrugHTML,admin_sugar:adminSugarHTML,admin_bpdrug_detail:adminBPDrugDetailHTML,admin_sugar_detail:adminSugarDetailHTML,backup:backupHTML};
  return(map[PAGE]||homeHTML)();
}

function backupHTML(){
  const pts=DB.patients.length,recs=DB.readings.length,bpd=DB.bpdrug.length,sg=DB.sugar.length,total=pts+recs+bpd+sg;
  const lastBackup=localStorage.getItem('kpk_last_backup')||'ยังไม่เคยสำรอง';
  return`<div style="min-height:100vh;background:#f0f4ff;padding:16px"><div style="max-width:480px;margin:0 auto">
  ${backBtn('← หน้าหลัก','#374151')}
  <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);border-radius:16px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px"><span style="font-size:30px">💾</span><div><div style="font-size:17px;font-weight:700;color:#fff">สำรองและกู้คืนข้อมูล</div><div style="font-size:12px;color:rgba(255,255,255,.85)">ป้องกันข้อมูลสูญหาย</div></div></div>
  <div class="card">
    <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:12px">สถานะข้อมูลปัจจุบัน</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:#dbeafe;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#1e3a8a">${pts}</div><div style="font-size:11px;color:#1e40af">คนไข้ (7วัน)</div></div>
      <div style="background:#fee2e2;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#991b1b">${recs}</div><div style="font-size:11px;color:#991b1b">บันทึกความดัน</div></div>
      <div style="background:#eff6ff;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#1d4ed8">${bpd}</div><div style="font-size:11px;color:#1d4ed8">รายการรับยา</div></div>
      <div style="background:#d1fae5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#065f46">${sg}</div><div style="font-size:11px;color:#065f46">เจาะน้ำตาล</div></div>
    </div>
    <div style="background:#f8faff;border-radius:10px;padding:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:#374151">รายการทั้งหมด: <strong>${total}</strong></span>
      <span style="font-size:11px;color:#64748b;text-align:right">สำรองล่าสุด:<br>${lastBackup}</span>
    </div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#1e3a8a;margin-bottom:4px">ดาวน์โหลดไฟล์สำรองข้อมูล</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">บันทึกเป็นไฟล์ .json ไว้ใน Google Drive ควรทำทุกวัน</div>
    <button onclick="exportData()" class="btn" style="width:100%;background:#1e3a8a;color:#fff;padding:13px;font-size:15px;margin-bottom:8px">ดาวน์โหลดไฟล์สำรอง (.json)</button>
    <div style="font-size:11px;color:#64748b;text-align:center">ไฟล์จะชื่อ kpk_backup_วันที่.json</div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#059669;margin-bottom:4px">นำเข้าข้อมูลจากไฟล์สำรอง</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">ใช้เมื่อเปลี่ยนเครื่อง หรือข้อมูลหายจากการล้างแคช</div>
    <div style="background:#fef3c7;border:1.5px solid #f59e0b;border-radius:10px;padding:10px;margin-bottom:12px"><div style="font-size:12px;color:#92400e;font-weight:600">คำเตือน: การนำเข้าจะเพิ่มข้อมูลเข้าไป ไม่ได้ลบข้อมูลเดิม</div></div>
    <label style="display:block;width:100%;background:#059669;color:#fff;padding:13px;border-radius:11px;cursor:pointer;text-align:center;font-size:15px;font-weight:700">เลือกไฟล์สำรอง (.json)<input type="file" accept=".json" onchange="importData(this)" style="display:none"></label>
    <div id="import_status" style="margin-top:10px;font-size:13px;text-align:center"></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:700;color:#b45309;margin-bottom:4px">ส่งออกรายงาน Excel (.csv)</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">ส่งออกข้อมูลความดัน 7 วัน สำหรับเปิดใน Excel</div>
    <button onclick="exportCSV()" class="btn" style="width:100%;background:#b45309;color:#fff;padding:13px;font-size:15px">ดาวน์โหลด Excel (.csv)</button>
  </div>
  <div class="card" style="border:2px solid #fee2e2">
    <div style="font-size:14px;font-weight:700;color:#dc2626;margin-bottom:4px">ล้างข้อมูลทั้งหมด</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:12px">ใช้เมื่อต้องการเริ่มต้นใหม่ทั้งหมด ข้อมูลจะหายถาวร</div>
    <button onclick="clearAllData()" class="btn" style="width:100%;background:#fee2e2;color:#dc2626;padding:13px;font-size:15px;border:2px solid #fca5a5">ล้างข้อมูลทั้งหมด</button>
  </div>
</div></div>`
}

function exportData(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
  const backup={version:'kpk_v3',exportedAt:now.toISOString(),exportedAtTH:now.toLocaleString('th-TH'),data:DB};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`kpk_backup_${dateStr}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  localStorage.setItem('kpk_last_backup',now.toLocaleString('th-TH'));
  alert('ดาวน์โหลดไฟล์สำรองเรียบร้อยแล้วค่ะ\nเก็บไฟล์ไว้ใน Google Drive หรือ Line Saved Messages');
  PAGE='backup';R();
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const backup=JSON.parse(e.target.result);
      const imported=backup.data||backup;
      let added={patients:0,readings:0,bpdrug:0,sugar:0};
      ['patients','readings','bpdrug','sugar'].forEach(key=>{
        if(Array.isArray(imported[key])){imported[key].forEach(item=>{const exists=(DB[key]||[]).some(x=>x.id===item.id);if(!exists){if(!DB[key])DB[key]=[];DB[key].push(item);added[key]++;}});}
      });
      saveDB();
      const s=document.getElementById('import_status');
      if(s)s.innerHTML=`<div style="background:#d1fae5;border-radius:10px;padding:12px;color:#065f46;font-weight:700">นำเข้าสำเร็จ!<br>คนไข้ +${added.patients} | ความดัน +${added.readings}<br>รับยา +${added.bpdrug} | น้ำตาล +${added.sugar}</div>`;
      setTimeout(()=>{PAGE='backup';R();},1500);
    }catch(err){const s=document.getElementById('import_status');if(s)s.innerHTML=`<div style="background:#fee2e2;border-radius:10px;padding:12px;color:#991b1b;font-weight:700">เกิดข้อผิดพลาด: ไฟล์ไม่ถูกต้อง</div>`;}
  };reader.readAsText(file);
}

function exportCSV(){
  const recs=DB.readings;if(!recs.length){alert('ยังไม่มีข้อมูลความดัน 7 วัน');return}
  const headers=['ชื่อ','นามสกุล','อายุ','หมู่บ้าน','วัน/ช่วง','วันที่','เวลา','ตัวบน1','ตัวล่าง1','ชีพจร1','ตัวบน2','ตัวล่าง2','ชีพจร2','อสม.'];
  const rows=recs.map(r=>{const p=DB.patients.find(x=>x.id===r.pid)||{};return[p.prefix+(p.fname||''),p.lname||'',p.age||'',p.village||'',`วัน${r.day} ${r.session==='morning'?'เช้า':'เย็น'}`,r.date,r.time,r.sys1,r.dia1,r.pulse1||'',r.sys2,r.dia2,r.pulse2||'',r.aorName].map(v=>`"${v}"`).join(',');});
  const bom='\uFEFF';const csv=bom+[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const dateStr=new Date().toLocaleDateString('th-TH').replace(/\//g,'-');
  a.href=url;a.download=`kpk_bp7_${dateStr}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function clearAllData(){
  if(!confirm('ต้องการล้างข้อมูลทั้งหมดใช่ไหม?\nข้อมูลจะหายถาวร'))return;
  if(!confirm('ยืนยันอีกครั้ง: ล้างข้อมูลทั้งหมดจริงๆ ใช่ไหม?'))return;
  DB={patients:[],readings:[],bpdrug:[],sugar:[]};saveDB();alert('ล้างข้อมูลเรียบร้อยแล้ว');PAGE='home';R();
}

<div style="min-height:100vh;background:linear-gradient(150deg,#1a56db 0%,#0ea5e9 50%,#22d3ee 100%);padding-bottom:30px">
  <div style="padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.2)">
    <div style="font-size:12px;color:rgba(255,255,255,.85)">โรงพยาบาลส่งเสริมสุขภาพตำบล</div>
    <div style="font-size:22px;font-weight:700;color:#fff;margin:2px 0">แก่งผักกูด</div>
    <div style="font-size:12px;color:rgba(255,255,255,.8)">อ.ท่าหลวง จ.ลพบุรี | ระบบ อสม. ตำบลแก่งผักกูด</div>
  </div>
  <div style="padding:16px">
    <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.5px;margin-bottom:10px">สำหรับ อสม.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
      ${hBtn('🩺','วัดความดัน<br>7 วัน','#e63946','bp7_lookup')}
      ${hBtn('💊','วัดความดัน<br>รับยา','#2563eb','bpdrug')}
      ${hBtn('🩸','เจาะ<br>น้ำตาล','#059669','sugar_direct')}
    </div>
    <button onclick="nav('bp7_status')" style="width:100%;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:12px;padding:10px;cursor:pointer;font-family:Sarabun;font-size:13px;font-weight:700;margin-bottom:16px">ตรวจสอบสถานะ — ส่งไปแล้วกี่ครั้ง?</button>
    <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.5px;margin-bottom:10px">สำหรับ Admin</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      ${hBtn('📊','ข้อมูลส่งต่อ<br>7 วัน','#7c3aed','bp7_admin')}
      ${hBtn('📋','Dashboard<br>ทั้งหมด','#b45309','dashboard')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      ${hBtn('💊','ประวัติวัด<br>รับยา','#0369a1','admin_bpdrug')}
      ${hBtn('🩸','ประวัติ<br>เจาะน้ำตาล','#065f46','admin_sugar')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      ${hBtn('💾','สำรอง/<br>กู้คืนข้อมูล','#374151','backup')}
      ${hBtn('📖','วิธีวัดความดัน<br>ที่ถูกต้อง','rgba(255,255,255,.25)','guide')}
    </div>
  </div>
</div>`}

function hBtn(ico,label,color,target){
  const fn=target==='sugar_direct'?`FORM.fromBP=false;FORM.bpShared={};DIS_SEL=[];_fast=null;PAGE='sugar';R()`:`nav('${target}')`;
  return`<button onclick="${fn}" style="background:${color};color:#fff;border:none;border-radius:14px;padding:14px 6px 12px;cursor:pointer;font-family:Sarabun;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.4;width:100%"><span style="font-size:26px;line-height:1">${ico}</span>${label}</button>`
}

function lbl(t,r){return`<div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:5px">${t}${r?'<span style="color:#dc2626"> *</span>':''}</div>`}
function hdr(ico,title,sub,color){return`<div style="background:${color};border-radius:16px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px"><span style="font-size:30px">${ico}</span><div><div style="font-size:17px;font-weight:700;color:#fff">${title}</div><div style="font-size:12px;color:rgba(255,255,255,.85)">${sub}</div></div></div>`}
function backBtn(label,color,fn){return`<button onclick="${fn||"nav('home')"}" class="btn" style="background:${color};color:#fff;padding:8px 14px;font-size:13px;margin-bottom:12px">${label||'← หน้าหลัก'}</button>`}
function avg(a){return a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length):0}

function patientFieldsHTML(pfx,d){
  d=d||{};
  return`
  <div style="display:grid;grid-template-columns:110px 1fr;gap:10px;margin-bottom:10px">
    <div>${lbl('คำนำหน้า',1)}<select id="${pfx}_pre" class="inp" style="padding:8px">${PREFIXES.map(p=>`<option ${d.prefix===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <div>${lbl('ชื่อจริง',1)}<input id="${pfx}_fn" class="inp" placeholder="ชื่อจริง" value="${d.fname||''}"></div>

    <div>${lbl('อายุ (ปี)',1)}<input id="${pfx}_age" class="inp" type="number" min="1" max="120" placeholder="อายุ" value="${d.age||''}"></div>
    <div>${lbl('เพศ')}<select id="${pfx}_gender" class="inp" style="padding:8px"><option ${d.gender==='ชาย'?'selected':''}>ชาย</option><option ${d.gender==='หญิง'?'selected':''}>หญิง</option></select></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div>${lbl('บ้านเลขที่')}<input id="${pfx}_house" class="inp" placeholder="เช่น 12/3" value="${d.house||''}"></div>

  <div id="${pfx}_outbox" style="display:${d.village==='นอกเขต'?'block':'none'};margin-bottom:10px">${lbl('ระบุที่อยู่นอกเขต')}<input id="${pfx}_out" class="inp" placeholder="ระบุที่อยู่..." value="${d.outarea||''}"></div>
  <div style="margin-bottom:4px">${lbl('โรคประจำตัว')}
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:6px" id="${pfx}_dis">
      ${DIS_PRESET.map(d=>`<div class="chk-item" onclick="togDis(this,'${d}','${pfx}')">${d}</div>`).join('')}
    </div>
    <input id="${pfx}_dis_o" class="inp" placeholder="อื่นๆ ระบุ..." style="margin-top:8px">

}

function chkOut(pfx){const v=document.getElementById(pfx+'_vil').value;document.getElementById(pfx+'_outbox').style.display=v==='นอกเขต'?'block':'none'}
function togDis(el,d,pfx){const nd='ไม่มีโรคประจำตัว';if(d===nd){if(el.classList.contains('on')){el.classList.remove('on');DIS_SEL=DIS_SEL.filter(x=>x!==d)}else{document.querySelectorAll('#'+pfx+'_dis .chk-item').forEach(x=>x.classList.remove('on'));el.classList.add('on');DIS_SEL=[nd]}}else{const noEl=document.querySelector('#'+pfx+'_dis .chk-item');if(noEl){noEl.classList.remove('on');DIS_SEL=DIS_SEL.filter(x=>x!==nd)}if(el.classList.contains('on')){el.classList.remove('on');DIS_SEL=DIS_SEL.filter(x=>x!==d)}else{el.classList.add('on');if(!DIS_SEL.includes(d))DIS_SEL.push(d)}}}
function getPt(pfx){const g=id=>document.getElementById(id)?.value||'';return{prefix:g(pfx+'_pre'),fname:g(pfx+'_fn'),lname:g(pfx+'_ln'),age:g(pfx+'_age'),gender:g(pfx+'_gender'),house:g(pfx+'_house'),village:g(pfx+'_vil'),outarea:g(pfx+'_out'),diseases:[...DIS_SEL,g(pfx+'_dis_o')].filter(Boolean).join(', ')}}
function flagInp(el,limit){const v=parseInt(el.value);if(isNaN(v)){el.style.cssText='border-color:#d1d9e6;background:#fff;color:#1a202c';return}const hi=v>limit;el.style.borderColor=hi?'#dc2626':'#059669';el.style.background=hi?'#fef2f2':'#f0fdf4';el.style.color=hi?'#dc2626':'#065f46'}

function doSearch(){
  const q=(document.getElementById('srch')?.value||'').trim().toLowerCase(),box=document.getElementById('srch_res');
  if(!box)return;if(!q){box.innerHTML='';return}
  const res=DB.patients.filter(p=>(p.fname+p.lname).toLowerCase().includes(q));
  if(!res.length){box.innerHTML=`<div style="text-align:center;color:#64748b;padding:10px;font-size:13px">ไม่พบคนไข้</div>`;return}
  box.innerHTML=res.map(p=>{const recs=DB.readings.filter(r=>r.pid===p.id),sent=recs.length,pct=Math.round(sent/14*100),next=getNext(p.id),hasHi=recs.some(r=>r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85),sc=sent>=14?'#059669':hasHi?'#dc2626':'#2563eb';
  return`<div onclick="selPt('${p.id}')" class="pt-card" style="border-left:4px solid ${sc}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div style="font-weight:700;font-size:14px;color:#1a202c">${p.prefix}${p.fname} ${p.lname}</div><span class="badge" style="background:${sent>=14?'#d1fae5':sent>0?'#dbeafe':'#fee2e2'};color:${sent>=14?'#065f46':sent>0?'#1e3a8a':'#991b1b'}">${sent}/14</span></div><div style="font-size:12px;color:#64748b;margin-bottom:6px">${p.village} | อายุ ${p.age} ปี</div><div style="background:#e2e8f0;border-radius:6px;height:6px;margin-bottom:5px"><div style="background:${sc};height:6px;border-radius:6px;width:${Math.min(pct,100)}%"></div></div>${next?`<div style="font-size:11px;color:#6d28d9;font-weight:700;background:#f5f3ff;padding:4px 8px;border-radius:7px;display:inline-block">ถัดไป: วันที่ ${next.day} ช่วง${next.sess} (ครั้งที่ ${next.num}/14)</div>`:`<div style="font-size:11px;color:#065f46;font-weight:700;background:#d1fae5;padding:4px 8px;border-radius:7px;display:inline-block">ครบ 14 ครั้งแล้ว!</div>`}</div>`}).join('')
}

function getNext(pid){const sent=DB.readings.filter(r=>r.pid===pid).length;if(sent>=14)return null;const day=Math.floor(sent/2)+1,sess=sent%2===0?'เช้า':'เย็น',sessEn=sent%2===0?'morning':'evening';return{day,sess,sessEn,num:sent+1}}

function bp7InfoHTML(){return`<div style="min-height:100vh;background:#f0f4ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← กลับ','#e63946',"nav('bp7_lookup')")}${hdr('👤','ข้อมูลคนไข้','กรอกข้อมูลทั่วไป','#e63946')}<div class="card">${patientFieldsHTML('bi',{})}<button onclick="savePt7()" class="btn" style="width:100%;background:#e63946;color:#fff;padding:13px;margin-top:12px;font-size:15px">บันทึก → ไปกรอกความดัน</button></div></div></div>`}

function bpDrugHTML(){return`<div style="min-height:100vh;background:#eff6ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('บันทึก & กลับหน้าหลัก','#2563eb',"saveBPDrugDraft(true)")}${hdr('💊','วัดความดัน เพื่อรับยา','รพ.สต.แก่งผักกูด','linear-gradient(135deg,#1d4ed8,#2563eb)')}<div class="card"><div style="background:#dbeafe;padding:5px 10px;border-radius:7px;margin-bottom:12px;display:inline-block;font-size:12px;font-weight:700;color:#1e40af">ข้อมูลทั่วไปผู้ป่วย</div>${patientFieldsHTML('bd',{})}</div><div class="card"><div style="background:#dbeafe;padding:5px 10px;border-radius:7px;margin-bottom:12px;display:inline-block;font-size:12px;font-weight:700;color:#1e40af">ผลการวัดความดัน</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px"><div>${lbl('วันที่วัด',1)}<input id="bd_date" type="date" class="inp" value="${new Date().toISOString().split('T')[0]}"></div><div>${lbl('เวลาวัด',1)}<input id="bd_time" type="time" class="inp" value="${new Date().toTimeString().slice(0,5)}"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px"><div>${lbl('ความดันตัวบน',1)}<input id="bd_sys" type="number" class="inp" placeholder="mmHg" style="font-size:18px;font-weight:700;text-align:center" oninput="flagInp(this,135);chkBPW()"><div style="font-size:10px;color:#dc2626;margin-top:2px">เกิน 135 = สูง</div></div><div>${lbl('ความดันตัวล่าง',1)}<input id="bd_dia" type="number" class="inp" placeholder="mmHg" style="font-size:18px;font-weight:700;text-align:center" oninput="flagInp(this,85);chkBPW()"><div style="font-size:10px;color:#dc2626;margin-top:2px">เกิน 85 = สูง</div></div></div><div id="bd_warn" style="display:none;background:#fee2e2;border:2px solid #dc2626;border-radius:10px;padding:9px;text-align:center;font-size:13px;font-weight:700;color:#991b1b;margin-bottom:8px">ความดันสูงกว่าเกณฑ์ — แจ้งแพทย์/เจ้าหน้าที่</div></div><div class="card"><div style="background:#fef3c7;padding:5px 10 function chkBPW(){const s=parseInt(document.getElementById('bd_sys')?.value)||0,d=parseInt(document.getElementById('bd_dia')?.value)||0,w=document.getElementById('bd_warn');if(w)w.style.display=(s>135||d>85)?'block':'none'}

function submitBPDrug(){const d=collectBPDrug();if(!d.pt.fname||!d.pt.lname||!d.pt.age){alert('กรุณากรอกข้อมูลให้ครบ');return}if(!d.sys||!d.dia){alert('กรุณากรอกค่าความดัน');return}if(!d.sym){alert('กรุณากรอกอาการ');return}if(!d.aor){alert('กรุณากรอกชื่อ อสม.');return}DB.bpdrug.push({id:Date.now().toString(36),type:'bpdrug',...d.pt,...d,ts:new Date().toISOString()});saveDB();AOR=d.aor;FORM.bpShared={...d.pt,...d,aor:d.aor};FORM.fromBP=true;const hi=parseInt(d.sys)>135||parseInt(d.dia)>85;document.getElementById('root').innerHTML=`<div style="min-height:100vh;background:#eff6ff;display:flex;align-items:center;justify-content:center;padding:20px"><div class="card" style="max-width:380px;width:100%;text-align:center;padding:26px 22px"><div style="font-size:52px;margin-bottom:10px">${hi?'⚠️':'✅'}</div><div style="font-size:17px;font-weight:700;color:${hi?'#dc2626':'#059669'};margin-bottom:10px">${hi?'บันทึกแล้ว — ความดันสูง!':'บันทึกสำเร็จ!'}</div><div style="background:${hi?'#fee2e2':'#dbeafe'};border-radius:12px;padding:12px;margin-bottom:14px"><div style="font-size:20px;font-weight:700;color:${hi?'#dc2626':'#1e3a8a'}">${d.sys}/${d.dia} mmHg</div><div style="font-size:13px;color:#374151;margin-top:4px">${d.pt.prefix}${d.pt.fname} ${d.pt.lname}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button onclick="nav('home')" class="btn" style="background:#e2e8f0;color:#374151;padding:12px">หน้าหลัก</button><button onclick="goSugarFromBP()" class="btn" style="background:#059669;color:#fff;padding:12px">เจาะน้ำตาล →</button></div></div></div>`;attachAll()}
function goSugarFromBP(){FORM.fromBP=true;DIS_SEL=[];_fast=null;PAGE='sugar';R()}

function sugarHTML(){const fromBP=FORM.fromBP&&FORM.bpShared?.fname,sh=FORM.bpShared||{};return`<div style="min-height:100vh;background:#f0fdf4;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('บันทึก & กลับหน้าหลัก','#059669','saveSugarDraft(true)')}${hdr('🩸','เจาะน้ำตาลในเลือดปลายนิ้ว','รพ.สต.แก่งผักกูด','linear-gradient(135deg,#059669,#10b981)')}${fromBP?`<div class="card" style="border:2px solid #10b981;padding:14px"><div style="font-size:12px;color:#059669;font-weight:700;margin-bottom:6px">ดึงข้อมูลจากหน้าวัดความดันรับยา</div><div style="font-weight:700;font-size:15px;color:#1a202c">${sh.prefix}${sh.fname} ${sh.lname}</div><div style="font-size:13px;color:#374151;margin-top:3px">อายุ ${sh.age} ปี | ${sh.village}${sh.outarea?' ('+sh.outarea+')':''}</div><div style="font-size:13px;color:#374151;margin-top:2px">โรคประจำตัว: ${sh.diseases||'-'}</div></div>`:`<div class="card"><div style="background:#d1fae5;padding:5px 10px;border-radius:7px;margin-bottom:12px;display:inline-block;font-size:12px;font-weight:700;color:#065f46">ข้อมูลทั่วไปผู้ป่วย</div>${patientFieldsHTML('sg',{})}</div>`}<div class="card"><div style="background:#d1fae5;padding:5px 10px;border-radius:7px;margin-bottom:12px;display:inline-block;font-size:12px;font-weight:700;color:#065f46">ผลการเจาะน้ำตาล</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div>${lbl('วันที่เจาะ',1)}<input id="sg_date" type="date" class="inp" value="${new Date().toISOString().split('T')[0]}"></div><div>${lbl('เวลาที่เจาะ',1)}<input id="sg_time" type="time" class="inp" value="${new Date().toTimeString().slice(0,5)}"></div></div><div style="margin-bottom:12px">${lbl('ภาวะก่อนเจาะ',1)}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px"><div class="chk-item" id="fast_y" onclick="setFast(true)">งดอาหาร (FBS)</div><div class="chk-item" id="fast_n" onclick="setFast(false)">ไม่งดอาหาร (RBS)</div></div></div><div style="margin-bottom:10px">${lbl('ค่าระดับน้ำตาล (mg/dL)',1)}<input id="sg_val" type="number" class="inp" placeholder="mg/dL" style="font-size:22px;font-weight:700;text-align:center;margin-bottom:8px" oninput="updSugar()"><div id="sg_res" style="display:none;border-radius:12px;padding:13px;text-align:center;border:2px solid #ccc"><div id="sg_icon" style="font-size:26px;margin-bottom:4px"></div><div id="sg_lbl" style="font-size:16px;font-weight:700"></div><div id="sg_rng" style="font-size:11px;margin-top:3px"></div></div></div><div style="margin-bottom:10px">${lbl('หมายเหตุ')}<textarea id="sg_note" class="inp" rows="2" style="resize:none" placeholder="บันทึกเพิ่มเติม..."></textarea></div>${lbl('ชื่อ-นามสกุล อสม.',1)}<input id="sg_aor" class="inp" placeholder="ชื่อ อสม." value="${sh.aor||AOR}"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px"><button onclick="saveSugarDraft(true)" class="btn" style="background:#e2e8f0;color:#374151;padding:13px">บันทึก & กลับ</button><button onclick="submitSugar(${fromBP?'true':'false'})" class="btn" style="background:#059669;color:#fff;padding:13px">บันทึกข้อมูล</button></div></div></div>`}

function setFast(v){_fast=v;document.getElementById('fast_y').classList.toggle('on',v===true);document.getElementById('fast_n').classList.toggle('on',v===false);updSugar()}
function updSugar(){const val=parseInt(document.getElementById('sg_val')?.value)||0,box=document.getElementById('sg_res');if(!box||val<20){if(box)box.style.display='none';return}box.style.display='block';let lv,color,bg,icon,range;if(_fast===true){if(val<100){lv='ปกติ';color='#065f46';bg='#d1fae5';icon='✅';range='FBS น้อยกว่า 100'}else if(val<126){lv='เสี่ยงเบาหวาน';color='#92400e';bg='#fef3c7';icon='⚠️';range='FBS 100–125'}else{lv='เบาหวาน';color='#991b1b';bg='#fee2e2';icon='🔴';range='FBS 126 ขึ้นไป'}}else if(_fast===false){if(val<140){lv='ปกติ';color='#065f46';bg='#d1fae5';icon='✅';range='RBS น้อยกว่า 140'}else if(val<200){lv='เสี่ยงเบาหวาน';color='#92400e';bg='#fef3c7';icon='⚠️';range='RBS 140–199'}else{lv='เบาหวาน';color='#991b1b';bg='#fee2e2';icon='🔴';range='RBS 200 ขึ้นไป'}}else{lv=val<126?'อ่านค่าได้':val<200?'ระดับสูง':'ระดับสูงมาก';color=val<126?'#065f46':val<200?'#92400e':'#991b1b';bg=val<126?'#d1fae5':val<200?'#fef3c7':'#fee2e2';icon=val<126?'✅':'⚠️';range='โปรดระบุภาวะงดอาหาร'}box.style.background=bg;box.style.borderColor=color;document.getElementById('sg_icon').textContent=icon;document.getElementById('sg_lbl').textContent=`${val} mg/dL — ${lv}`;document.getElementById('sg_lbl').style.color=color;document.getElementById('sg_rng').textContent=range;document.getElementById('sg_rng').style.color=color}
function collectSugar(fromBP){fromBP=fromBP===true||fromBP==='true';const pt=fromBP?FORM.bpShared:getPt('sg');return{pt,val:document.getElementById('sg_val')?.value||'',fast:_fast,note:document.getElementById('sg_note')?.value||'',aor:document.getElementById('sg_aor')?.value?.trim()||'',date:document.getElementById('sg_date')?.value||'',time:document.getElementById('sg_time')?.value||''}}
function saveSugarDraft(goHome){const fromBP=FORM.fromBP&&FORM.bpShared?.fname;const d=collectSugar(fromBP);if(!d.pt||!d.pt.fname){if(goHome){nav('home');return}return}if(d.val&&d.aor){const v=parseInt(d.val)||0;let lv='';if(d.fast===true)lv=v<100?'ปกติ':v<126?'เสี่ยงเบาหวาน':'เบาหวาน';else if(d.fast===false)lv=v<140?'ปกติ':v<200?'เสี่ยงเบาหวาน':'เบาหวาน';DB.sugar.push({id:Date.now().toString(36),type:'sugar',...d.pt,val:d.val,fast:d.fast,level:lv,note:d.note,aor:d.aor,date:d.date,time:d.time,ts:new Date().toISOString()});saveDB();AOR=d.aor}FORM.fromBP=false;FORM.bpShared={};if(goHome)showSavedToast('บันทึกข้อมูลเจาะน้ำตาลแล้ว')}
function submitSugar(fromBP){fromBP=fromBP===true||fromBP==='true';const d=collectSugar(fromBP);if(!d.pt.fname||!d.pt.lname||!d.pt.age){alert('กรุณากรอกข้อมูลให้ครบ');return}if(!d.val){alert('กรุณากรอกค่าระดับน้ำตาล');return}if(d.fast===null){alert('กรุณาเลือกภาวะก่อนเจาะ');return}if(!d.aor){alert('กรุณากรอกชื่อ อสม.');return}AOR=d.aor;const v=parseInt(d.val)||0,isFast=d.fast===true;let lv,color,bg;if(isFast){lv=v<100?'ปกติ':v<126?'เสี่ยงเบาหวาน':'เบาหวาน';color=v<100?'#065f46':v<126?'#92400e':'#991b1b';bg=v<100?'#d1fae5':v<126?'#fef3c7':'#fee2e2'}else{lv=v<140?'ปกติ':v<200?'เสี่ยงเบาหวาน':'เบาหวาน';color=v<140?'#065f46':v<200?'#92400e':'#991b1b';bg=v<140?'#d1fae5':v<200?'#fef3c7':'#fee2e2'}DB.sugar.push({id:Date.now().toString(36),type:'sugar',...d.pt,val:d.val,fast:d.fast,level:lv,note:d.note,aor:d.aor,date:d.date,time:d.time,ts:new Date().toISOString()});saveDB();FORM.fromBP=false;FORM.bpShared={};document.getElementById('root').innerHTML=`<div style="min-height:100vh;background:#f0fdf4;display:flex;align-items:center;justify-content:center;padding:20px"><div class="card" style="max-width:380px;width:100%;text-align:center;padding:26px 22px"><div style="font-size:52px;margin-bottom:10px">🩸</div><div style="font-size:17px;font-weight:700;color:#059669;margin-bottom:10px">บันทึกเจาะน้ำตาลสำเร็จ!</div><div style="background:${bg};border-radius:12px;padding:14px;margin-bottom:14px"><div style="font-weight:700;font-size:14px;color:#1a202c;margin-bottom:4px">${d.pt.prefix}${d.pt.fname} ${d.pt.lname}</div><div style="font-size:12px;color:${color};margin-bottom:4px">${isFast?'งดอาหาร (FBS)':'ไม่งดอาหาร (RBS)'}</div><div style="font-size:32px;font-weight:700;color:${color}">${v} mg/dL</div><div style="font-size:15px;font-weight:700;color:${color};margin-top:4px">${lv}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button onclick="FORM.fromBP=false;FORM.bpShared={};DIS_SEL=[];_fast=null;PAGE='sugar';R()" class="btn" style="background:#e2e8f0;color:#374151;padding:12px">เจาะอีกราย</button><button onclick="nav('home')" class="btn" style="background:#059669;color:#fff;padding:12px">กลับหน้าหลัก</button></div></div></div>`;attachAll()}

function adminBPDrugHTML(){const recs=DB.bpdrug,total=recs.length,hiCount=recs.filter(r=>parseInt(r.sys)>135||parseInt(r.dia)>85).length;return`<div style="min-height:100vh;background:#eff6ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← หน้าหลัก','#0369a1')}${hdr('💊','ประวัติวัดความดันรับยา','Admin — สรุปรายงาน','#0369a1')}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:#dbeafe;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#1e3a8a">${total}</div><div style="font-size:11px;color:#1e40af">บันทึกทั้งหมด</div></div><div style="background:#fee2e2;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#991b1b">${hiCount}</div><div style="font-size:11px;color:#991b1b">ค่าสูง</div></div></div>${recs.length===0?`<div class="card" style="text-align:center;padding:30px;color:#64748b">ยังไม่มีข้อมูล</div>`:recs.slice().reverse().map(r=>{const hi=parseInt(r.sys)>135||parseInt(r.dia)>85;return`<div onclick="FORM.bpDrugRec=JSON.parse(JSON.stringify(r));nav('admin_bpdrug_detail')" class="pt-card" style="border-left:5px solid ${hi?'#dc2626':'#059669'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px"><div><div style="font-weight:700;font-size:14px;color:#1a202c">${r.prefix}${r.fname} ${r.lname}</div><div style="font-size:11px;color:#64748b">อายุ ${r.age} | ${r.village} | ${r.date} ${r.time}</div></div><span class="badge" style="background:${hi?'#fee2e2':'#d1fae5'};color:${hi?'#991b1b':'#065f46'}">${r.sys}/${r.dia}</span></div><div style="font-size:12px;color:#374151">อาการ: ${r.sym||'-'}</div><div style="margin-top:6px"><button onclick="event.stopPropagation();registerFromBPDrug('${r.id}')" class="btn" style="background:#dbeafe;color:#1e40af;padding:5px 12px;font-size:11px;border-radius:8px">+ ลงทะเบียนวัดความดัน 7 วัน</button></div></div>`}).join('')}</div></div>`}
function adminBPDrugDetailHTML(){const r=FORM.bpDrugRec;if(!r){nav('admin_bpdrug');return''}const hi=parseInt(r.sys)>135||parseInt(r.dia)>85;return`<div style="min-height:100vh;background:#eff6ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← กลับ','#0369a1',"nav('admin_bpdrug')")}<div class="card"><div style="font-size:16px;font-weight:700;color:#1a202c;margin-bottom:4px">${r.prefix}${r.fname} ${r.lname}</div><div style="font-size:12px;color:#64748b;margin-bottom:14px">อายุ ${r.age} ปี (${r.gender}) | บ้าน ${r.house||'-'} | ${r.village==='นอกเขต'?`นอกเขต: ${r.outarea}`:r.village}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:${hi?'#fee2e2':'#dbeafe'};border-radius:12px;padding:14px;text-align:center"><div style="font-size:11px;color:#374151;margin-bottom:4px">ความดัน</div><div style="font-size:26px;font-weight:700;color:${hi?'#dc2626':'#1e3a8a'}">${r.sys}/${r.dia}</div><div style="font-size:10px;color:#64748b">mmHg</div></div><div style="background:#f0fdf4;border-radius:12px;padding:14px"><div style="font-size:11px;color:#374151;margin-bottom:4px">วันที่วัด</div><div style="font-size:14px;font-weight:700;color:#065f46">${r.date}</div><div style="font-size:12px;color:#64748b">เวลา ${r.time}</div></div></div>${[['โรคประจำตัว',r.diseases||'-'],['อาการที่รับยา',r.sym||'-'],['แพ้ยา',r.allergy||'ไม่มี'],['อสม.',r.aor]].map(([k,v])=>`<div style="border-bottom:1px solid #f0f0f0;padding:8px 0;display:flex;justify-content:space-between"><span style="font-size:12px;color:#64748b">${k}</span><span style="font-size:13px;font-weight:600;color:#1a202c;text-align:right;max-width:60%">${v}</span></div>`).join('')}<button onclick="registerFromBPDrug('${r.id}')" class="btn" style="width:100%;background:#2563eb;color:#fff;padding:12px;margin-top:12px">+ ลงทะเบียนวัดความดัน 7 วัน</button></div></div></div>`}
function registerFromBPDrug(rid){const r=DB.bpdrug.find(x=>x.id===rid);if(!r)return;const existing=DB.patients.find(p=>p.fname===r.fname&&p.lname===r.lname);if(existing){alert(`${r.prefix}${r.fname} ${r.lname} มีในระบบแล้ว`);FORM.patient=existing;FORM.next=getNext(existing.id);nav('bp7_form');return}const id=Date.now().toString(36)+Math.random().toString(36).slice(2,4);const pt={id,prefix:r.prefix,fname:r.fname,lname:r.lname,age:r.age,gender:r.gender,house:r.house||'',village:r.village,outarea:r.outarea||'',diseases:r.diseases||'',createdAt:new Date().toISOString()};DB.patients.push(pt);saveDB();FORM.patient=pt;FORM.next=getNext(id);alert(`ลงทะเบียน ${r.prefix}${r.fname} ${r.lname} สำเร็จ!`);nav('bp7_form')}

function adminSugarHTML(){const recs=DB.sugar,total=recs.length,dm=recs.filter(r=>r.level==='เบาหวาน').length,risk=recs.filter(r=>r.level==='เสี่ยงเบาหวาน').length;return`<div style="min-height:100vh;background:#f0fdf4;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← หน้าหลัก','#065f46')}${hdr('🩸','ประวัติเจาะน้ำตาล','Admin — สรุปรายงาน','#059669')}<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:#d1fae5;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#065f46">${total}</div><div style="font-size:11px;color:#065f46">ทั้งหมด</div></div><div style="background:#fef3c7;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#92400e">${risk}</div><div style="font-size:11px;color:#92400e">เสี่ยง</div></div><div style="background:#fee2e2;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#991b1b">${dm}</div><div style="font-size:11px;color:#991b1b">เบาหวาน</div></div></div>${recs.length===0?`<div class="card" style="text-align:center;padding:30px;color:#64748b">ยังไม่มีข้อมูล</div>`:recs.slice().reverse().map(r=>{const lc=r.level==='ปกติ'?'#065f46':r.level==='เสี่ยงเบาหวาน'?'#92400e':'#991b1b',bg=r.level==='ปกติ'?'#d1fae5':r.level==='เสี่ยงเบาหวาน'?'#fef3c7':'#fee2e2';return`<div onclick="FORM.sugarRec=JSON.parse(JSON.stringify(r));nav('admin_sugar_detail')" class="pt-card" style="border-left:5px solid ${lc}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px"><div><div style="font-weight:700;font-size:14px;color:#1a202c">${r.prefix}${r.fname} ${r.lname}</div><div style="font-size:11px;color:#64748b">อายุ ${r.age} | ${r.village} | ${r.date} ${r.time}</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:${lc}">${r.val}</div><div style="font-size:10px;color:#64748b">mg/dL</div></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#64748b">${r.fast===true?'งดอาหาร (FBS)':'ไม่งดอาหาร (RBS)'}</span><span class="badge" style="background:${bg};color:${lc}">${r.level||'-'}</span></div><div style="margin-top:6px"><button onclick="event.stopPropagation();registerFromSugar('${r.id}')" class="btn" style="background:#d1fae5;color:#065f46;padding:5px 12px;font-size:11px;border-radius:8px">+ ลงทะเบียนวัดความดัน 7 วัน</button></div></div>`}).join('')}</div></div>`}
function adminSugarDetailHTML(){const r=FORM.sugarRec;if(!r){nav('admin_sugar');return''}const lc=r.level==='ปกติ'?'#065f46':r.level==='เสี่ยงเบาหวาน'?'#92400e':'#991b1b',bg=r.level==='ปกติ'?'#d1fae5':r.level==='เสี่ยงเบาหวาน'?'#fef3c7':'#fee2e2';return`<div style="min-height:100vh;background:#f0fdf4;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← กลับ','#065f46',"nav('admin_sugar')")}<div class="card"><div style="font-size:16px;font-weight:700;color:#1a202c;margin-bottom:4px">${r.prefix}${r.fname} ${r.lname}</div><div style="font-size:12px;color:#64748b;margin-bottom:14px">อายุ ${r.age} ปี (${r.gender}) | ${r.village==='นอกเขต'?`นอกเขต: ${r.outarea}`:r.village}</div><div style="background:${bg};border-radius:14px;padding:16px;text-align:center;margin-bottom:12px"><div style="font-size:12px;color:${lc};margin-bottom:4px">${r.fast===true?'งดอาหาร (FBS)':'ไม่งดอาหาร (RBS)'}</div><div style="font-size:36px;font-weight:700;color:${lc}">${r.val} mg/dL</div><div style="font-size:16px;font-weight:700;color:${lc};margin-top:4px">${r.level||'-'}</div></div>${[['โรคประจำตัว',r.diseases||'-'],['หมายเหตุ',r.note||'-'],['อสม.',r.aor]].map(([k,v])=>`<div style="border-bottom:1px solid #f0f0f0;padding:8px 0;display:flex;justify-content:space-between"><span style="font-size:12px;color:#64748b">${k}</span><span style="font-size:13px;font-weight:600;color:#1a202c;text-align:right;max-width:60%">${v}</span></div>`).join('')}<button onclick="registerFromSugar('${r.id}')" class="btn" style="width:100%;background:#059669;color:#fff;padding:12px;margin-top:12px">+ ลงทะเบียนวัดความดัน 7 วัน</button></div></div></div>`}
function registerFromSugar(rid){const r=DB.sugar.find(x=>x.id===rid);if(!r)return;const existing=DB.patients.find(p=>p.fname===r.fname&&p.lname===r.lname);if(existing){alert(`${r.prefix}${r.fname} ${r.lname} มีในระบบแล้ว`);FORM.patient=existing;FORM.next=getNext(existing.id);nav('bp7_form');return}const id=Date.now().toString(36)+Math.random().toString(36).slice(2,4);const pt={id,prefix:r.prefix,fname:r.fname,lname:r.lname,age:r.age,gender:r.gender,house:r.house||'',village:r.village,outarea:r.outarea||'',diseases:r.diseases||'',createdAt:new Date().toISOString()};DB.patients.push(pt);saveDB();FORM.patient=pt;FORM.next=getNext(id);alert(`ลงทะเบียน ${r.prefix}${r.fname} ${r.lname} สำเร็จ!`);nav('bp7_form')}

function bp7StatusHTML(){const pts=DB.patients;return`<div style="min-height:100vh;background:#f0f4ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← หน้าหลัก','#7c3aed')}${hdr('📋','สถานะการส่งข้อมูล','ติดตามครั้งที่ส่งของแต่ละราย','#7c3aed')}${pts.length===0?`<div class="card" style="text-align:center;padding:30px;color:#64748b">ยังไม่มีคนไข้ในระบบ</div>`:''}${pts.map(p=>{const recs=DB.readings.filter(r=>r.pid===p.id),sent=recs.length,pct=Math.round(sent/14*100),next=getNext(p.id),hasHi=recs.some(r=>r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85),sc=sent>=14?'#059669':hasHi?'#dc2626':'#2563eb';return`<div class="card" style="border-left:5px solid ${sc}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-weight:700;font-size:14px;color:#1a202c">${p.prefix}${p.fname} ${p.lname}</div><div style="font-size:11px;color:#64748b">${p.village==='นอกเขต'?`นอกเขต: ${p.outarea}`:p.village}</div></div><span class="badge" style="background:${sent>=14?'#d1fae5':hasHi?'#fee2e2':'#dbeafe'};color:${sent>=14?'#065f46':hasHi?'#991b1b':'#1e3a8a'}">${sent>=14?'ครบแล้ว':hasHi?'ค่าสูง':'กำลังติดตาม'}</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="flex:1;background:#e2e8f0;border-radius:6px;height:8px"><div style="background:${sc};height:8px;border-radius:6px;width:${Math.min(pct,100)}%"></div></div><div style="font-size:13px;font-weight:700;color:${sc}">${sent}/14</div></div><div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px">${Array.from({length:14},(_,i)=>{const r=DB.readings.filter(x=>x.pid===p.id)[i],day=Math.floor(i/2)+1,sess=i%2===0?'เช้า':'เย็น';if(!r)return`<span style="background:#e2e8f0;color:#64748b;padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600">วัน${day} ${sess}</span>`;const hi=r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85;return`<span style="background:${hi?'#fee2e2':'#d1fae5'};color:${hi?'#991b1b':'#065f46'};padding:2px 7px;border-radius:7px;font-size:10px;font-weight:600">วัน${day} ${sess}${hi?' !':''}</span>`;}).join('')}</div>${next?`<div style="font-size:12px;color:#6d28d9;font-weight:700;background:#f5f3ff;padding:6px 10px;border-radius:8px">รอบถัดไป: วันที่ ${next.day} ช่วง${next.sess} (ครั้งที่ ${next.num}/14)</div>`:`<div style="font-size:12px;color:#065f46;font-weight:700;background:#d1fae5;padding:6px 10px;border-radius:8px">ส่งครบ 14 ครั้งแล้ว!</div>`}</div>`}).join('')}</div></div>`}
function bp7AdminHTML(){const pts=DB.patients,total=pts.length,done=pts.filter(p=>DB.readings.filter(r=>r.pid===p.id).length>=14).length,hi=pts.filter(p=>DB.readings.some(r=>r.pid===p.id&&(r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85))).length;return`<div style="min-height:100vh;background:#f0f4ff;padding:16px"><div style="max-width:480px;margin:0 auto">${backBtn('← หน้าหลัก','#7c3aed')}${hdr('📊','Admin: ติดตามคนไข้','วัดความดัน 7 วัน','#7c3aed')}<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:#dbeafe;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#1e3a8a">${total}</div><div style="font-size:11px;color:#1e40af">ทั้งหมด</div></div><div style="background:#d1fae5;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#065f46">${done}</div><div style="font-size:11px;color:#065f46">ครบ 7 วัน</div></div><div style="background:#fee2e2;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:#991b1b">${hi}</div><div style="font-size:11px;color:#991b1b">ค่าสูง</div></div></div>${pts.length===0?`<div class="card" style="text-align:center;padding:30px;color:#64748b">ยังไม่มีข้อมูล</div>`:''}${pts.map(p=>{const recs=DB.readings.filter(r=>r.pid===p.id),sent=recs.length,pct=Math.round(sent/14*100),hasHi=recs.some(r=>r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85),next=getNext(p.id),sc=sent>=14?'#059669':hasHi?'#dc2626':'#2563eb';return`<div onclick="FORM.viewPt=p.id;nav('bp7_detail')" class="pt-card" style="border-left:5px solid ${sc}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-weight:700;font-size:14px;color:#1a202c">${p.prefix}${p.fname} ${p.lname}</div><div style="font-size:11px;color:#64748b">อายุ ${p.age} | ${p.village==='นอกเขต'?`นอกเขต: ${p.outarea}`:p.village}</div></div><span class="badge" style="background:${sent>=14?'#d1fae5':hasHi?'#fee2e2':'#dbeafe'};color:${sent>=14?'#065f46':hasHi?'#991b1b':'#1e3a8a'}">${sent}/14</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div style="flex:1;background:#e2e8f0;border-radius:6px;height:7px"><div style="background:${sc};height:7px;border-radius:6px;width:${Math.min(pct,100)}%"></div></div><div style="font-size:11px;color:#64748b">${pct}%</div></div>${next?`<div style="font-size:11px;color:#6d28d9;font-weight:700">รอ: วันที่ ${next.day} ช่วง${next.sess}</div>`:`<div style="font-size:11px;color:#065f46;font-weight:700">ครบแล้ว — พิมพ์สรุปได้</div>`}</div>`}).join('')}</div></div>`}

function bp7DetailHTML(){
  const p=DB.patients.find(x=>x.id===FORM.viewPt);if(!p){nav('bp7_admin');return''}
  const recs=DB.readings.filter(r=>r.pid===p.id),sent=recs.length;
  const allSys=recs.flatMap(r=>[r.sys1,r.sys2]).filter(v=>v>0),allDia=recs.flatMap(r=>[r.dia1,r.dia2]).filter(v=>v>0),allP=recs.flatMap(r=>[r.pulse1,r.pulse2]).filter(v=>v>0);
  const aS=avg(allSys),aD=avg(allDia),aP=avg(allP),needRef=aS>135||aD>85;
  const addr=p.village==='นอกเขต'?`นอกเขต: ${p.outarea||'-'}`:p.village;
  return`<div style="min-height:100vh;background:#f0f4ff;padding:16px"><div style="max-width:500px;margin:0 auto">${backBtn('← กลับ','#7c3aed',"nav('bp7_admin')")}<div class="card"><div style="font-size:15px;font-weight:700;color:#1a202c;margin-bottom:4px">${p.prefix}${p.fname} ${p.lname}</div><div style="font-size:12px;color:#64748b;margin-bottom:12px">อายุ ${p.age} ปี | บ้าน ${p.house||'-'} | ${addr}</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px"><div style="background:${aS>135?'#fee2e2':'#dbeafe'};border-radius:10px;padding:10px;text-align:center"><div style="font-size:11px;color:#374151;margin-bottom:2px">เฉลี่ยตัวบน</div><div style="font-size:22px;font-weight:700;color:${aS>135?'#dc2626':'#1e3a8a'}">${aS||'-'}</div><div style="font-size:10px;color:#64748b">mmHg</div></div><div style="background:${aD>85?'#fee2e2':'#d1fae5'};border-radius:10px;padding:10px;text-align:center"><div style="font-size:11px;color:#374151;margin-bottom:2px">เฉลี่ยตัวล่าง</div><div style="font-size:22px;font-weight:700;color:${aD>85?'#dc2626':'#065f46'}">${aD||'-'}</div><div style="font-size:10px;color:#64748b">mmHg</div></div><div style="background:#fef3c7;border-radius:10px;padding:10px;text-align:center"><div style="font-size:11px;color:#374151;margin-bottom:2px">เฉลี่ยชีพจร</div><div style="font-size:22px;font-weight:700;color:#92400e">${aP||'-'}</div><div style="font-size:10px;color:#64748b">bpm</div></div></div>${needRef?`<div style="background:#fee2e2;border:2px solid #dc2626;border-radius:10px;padding:10px;text-align:center;margin-bottom:10px;font-size:13px;font-weight:700;color:#dc2626">ความดันเฉลี่ยเกิน 135/85 — พิจารณาส่งต่อ รพ.ท่าหลวง</div>`:`<div style="background:#d1fae5;border-radius:10px;padding:8px;text-align:center;margin-bottom:10px;font-size:13px;color:#065f46;font-weight:600">ความดันเฉลี่ยอยู่ในเกณฑ์ปกติ</div>`}<div style="background:#f5f3ff;border-radius:10px;padding:8px;text-align:center;margin-bottom:12px;font-size:13px;color:#4c1d95;font-weight:700">ส่งแล้ว ${sent}/14 | วัดรวม ${allSys.length} รอบ</div><div style="font-size:14px;font-weight:700;color:#1a202c;margin-bottom:10px">ประวัติการวัดทั้งหมด</div>${recs.map(r=>{const hi=r.sys1>135||r.sys2>135||r.dia1>85||r.dia2>85,sl=r.session==='morning'?'เช้า':'เย็น';return`<div style="border-bottom:1px solid #f0f0f0;padding:9px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:700;font-size:13px;background:${r.session==='morning'?'#fffbeb':'#f5f3ff'};color:${r.session==='morning'?'#92400e':'#4c1d95'};padding:3px 10px;border-radius:7px">วันที่ ${r.day} ช่วง${sl}</span><span class="badge" style="background:${hi?'#fee2e2':'#d1fae5'};color:${hi?'#991b1b':'#065f46'}">${hi?'ค่าสูง':'ปกติ'}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:3px"><div style="background:${r.sys1>135||r.dia1>85?'#fee2e2':'#f0f9ff'};border-radius:8px;padding:7px"><div style="font-size:10px;color:#64748b;margin-bottom:2px">ครั้งที่ 1</div><div style="font-size:14px;font-weight:700;color:${r.sys1>135?'#dc2626':'#0369a1'}">${r.sys1}/${r.dia1} mmHg | <span style="color:#92400e;font-size:11px">${r.pulse1||'-'} bpm</span></div></div><div style="background:${r.sys2>135||r.dia2>85?'#fee2e2':'#f5f3ff'};border-radius:8px;padding:7px"><div style="font-size:10px;color:#64748b;margin-bottom:2px">ครั้งที่ 2</div><div style="font-size:14px;font-weight:700;color:${r.sys2>135?'#dc2626':'#6d28d9'}">${r.sys2}/${r.dia2} mmHg | <span style="color:#92400e;font-size:11px">${r.pulse2||'-'} bpm</span></div></div></div><div style="font-size:11px;color:#6d28d9">อสม.: ${r.aorName}</div></div>`}).join('')}${sent>=14?`<button onclick="printSum('${p.id}')" class="btn" style="width:100%;background:#1e3a8a;color:#fff;padding:12px;margin-top:12px">พิมพ์สรุป A4 ส่ง รพ.ท่าหลวง</button>`:`<div style="background:#fef3c7;border-radius:10px;padding:10px;text-align:center;margin-top:10px;font-size:13px;color:#92400e;font-weight:600">รอข้อมูลครบ 14 ครั้ง (ขาดอีก ${14-sent} ครั้ง)</div>`}</div></div></div>`
}
